name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release-check:
    name: Check if version is already released
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version and check GitHub releases
        id: check
        run: |
          VERSION=$(grep -oP 'set\(MAPLIBRE_NET_VERSION "\K[^"]+' CMakeLists.txt | head -1)

          if echo "$VERSION" | grep -qP '\-(alpha|beta|rc)\.\d+'; then
            RELEASE_TYPE="prerelease"
          else
            RELEASE_TYPE="regular"
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            PUBLISHED="true"
          else
            PUBLISHED="false"
          fi

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED"       >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "VERSION: $VERSION"
          echo "RELEASE_TYPE: $RELEASE_TYPE"
          echo "PUBLISHED: $PUBLISHED"

    outputs:
      published:    ${{ steps.check.outputs.published }}
      version:      ${{ steps.check.outputs.version }}
      release_type: ${{ steps.check.outputs.release_type }}

  build:
    name: Build Windows release
    runs-on: windows-latest
    needs: release-check
    if: ${{ needs.release-check.outputs.published == 'false' }}
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize submodules (shallow)
        run: git submodule update --init --recursive --depth 1

      - name: Set up MSVC developer tools (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: dependencies/maplibre-native/platform/windows/vendor/vcpkg/installed
          key: vcpkg-x64-windows-${{ hashFiles('dependencies/maplibre-native/platform/windows/vendor/vcpkg/baseline.json', 'dependencies/maplibre-native/platform/windows/Get-VendorPackages.ps1') }}

      - name: Bootstrap vcpkg
        run: |
          & "dependencies\maplibre-native\platform\windows\vendor\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install vcpkg packages
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          $vcpkg = "dependencies\maplibre-native\platform\windows\vendor\vcpkg\vcpkg.exe"
          $triplets = "dependencies\maplibre-native\platform\windows\vendor\vcpkg-custom-triplets"
          & $vcpkg install curl dlfcn-win32 glfw3 libuv libjpeg-turbo libpng libwebp opengl-registry `
            --triplet x64-windows `
            --overlay-triplets="$triplets" `
            --disable-metrics `
            --clean-after-build

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target mbgl-dotnet --parallel

      - name: Package release artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.release-check.outputs.version }}"
          $outDir  = "build\Release"

          New-Item -ItemType Directory -Path publish -Force

          # Copy the managed assembly and its XML docs
          Copy-Item "$outDir\MaplibreNative.NET.dll" publish\
          if (Test-Path "$outDir\MaplibreNative.NET.xml") {
            Copy-Item "$outDir\MaplibreNative.NET.xml" publish\
          }

          # Copy any additional DLLs (vcpkg runtime dependencies)
          Get-ChildItem "$outDir\*.dll" |
            Where-Object { $_.Name -ne "MaplibreNative.NET.dll" } |
            Copy-Item -Destination publish\

          Compress-Archive -Path "publish\*" -DestinationPath "MaplibreNative.NET-v${version}-win-x64.zip"
          Write-Host "Packaged: MaplibreNative.NET-v${version}-win-x64.zip"
          Get-ChildItem publish\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: MaplibreNative.NET-v${{ needs.release-check.outputs.version }}-win-x64.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-check, build]
    if: ${{ needs.release-check.outputs.published == 'false' }}
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Extract changelog for version
        run: |
          VERSION="${{ needs.release-check.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $VERSION" \
              'BEGIN{p=0} $0==ver{p=1; next} /^## / && p==1{exit} p==1{print}' \
              CHANGELOG.md > changelog_for_version.md
          else
            echo "No changelog entry for v${VERSION}." > changelog_for_version.md
          fi
          echo "--- Release notes ---"
          cat changelog_for_version.md

      - name: Determine release flags
        id: flags
        run: |
          if [[ "${{ needs.release-check.outputs.release_type }}" == 'regular' ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:        v${{ needs.release-check.outputs.version }}
          name:       v${{ needs.release-check.outputs.version }}
          bodyFile:   changelog_for_version.md
          artifacts:  ./artifacts/MaplibreNative.NET-v${{ needs.release-check.outputs.version }}-win-x64.zip
          prerelease: ${{ steps.flags.outputs.prerelease }}
          allowUpdates: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
